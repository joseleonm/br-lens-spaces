<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BR Polynomial Database &mdash; Lens Spaces L(p,q)</title>
<script>
MathJax = { tex: { inlineMath: [['\\(','\\)']] }, startup: { typeset: false } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" defer></script>
<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;background:#f4f6fa;
     color:#1a1a2e;font-size:23px;line-height:1.55;}

/* ── Header ── */
#header{background:#1d3557;color:white;padding:16px 32px;
        display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
#header h1{margin:0;font-size:1.18em;font-weight:bold;color:white;flex:1;
           line-height:1.3;}
#header a.gh{color:white;font-size:0.85em;text-decoration:none;
             background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);
             padding:5px 14px;border-radius:5px;white-space:nowrap;font-weight:600;
             transition:background .15s;}
#header a.gh:hover{background:rgba(255,255,255,0.28);}

/* ── Layout ── */
#main{max-width:1340px;margin:0 auto;padding:28px 28px 56px;}

/* ── Explorer widget ── */
#br-quick-explorer{background:white;border:1px solid #ccd6ea;border-radius:10px;
                   padding:22px 26px;margin-bottom:28px;
                   box-shadow:0 2px 12px rgba(29,53,87,0.08);}
.intro-line{font-size:0.93em;color:#334;margin:0 0 18px;line-height:1.5;
            border-bottom:2px solid #e2eaf6;padding-bottom:12px;}
.page-footer{font-size:0.82em;color:#999;border-top:1px solid #dde;
             padding-top:12px;margin-top:28px;line-height:1.6;text-align:center;}
.page-footer a{color:#1d3557;text-decoration:none;}
.page-footer a:hover{text-decoration:underline;}

/* Selector row: case picker + open button side by side */
.selector-row{display:flex;align-items:flex-end;gap:14px;
              flex-wrap:wrap;margin-bottom:8px;}
.selector-row > div{flex:0 0 auto;}
.selector-row label{display:block;font-weight:700;margin-bottom:4px;
                    font-size:0.92em;color:#223;}
.selector-row select{padding:7px 10px;border:1px solid #c0cfe8;border-radius:5px;
                      background:white;font-size:1em;font-family:inherit;
                      min-width:160px;}
a.open-btn{display:inline-flex;align-items:center;gap:6px;
           background:#1d3557;color:white;padding:8px 22px;
           border-radius:5px;text-decoration:none;font-weight:700;
           font-size:0.94em;white-space:nowrap;transition:background .15s;
           border:none;cursor:pointer;}
a.open-btn:hover{background:#2a6496;}
a.open-btn .arrow{font-size:1.1em;}
.explorer-note{font-size:0.86em;color:#556;margin:6px 0 16px;
               line-height:1.45;font-style:italic;}

/* Filter controls */
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
          gap:10px;margin-bottom:12px;}
.controls label{display:block;font-weight:700;margin-bottom:3px;
                font-size:0.88em;color:#334;}
.controls select,.controls input[type="number"]{
  width:100%;padding:5px 8px;border:1px solid #c0cfe8;border-radius:4px;
  background:white;font-size:0.9em;font-family:inherit;}
.checks{display:flex;flex-wrap:wrap;gap:10px 22px;margin-bottom:10px;
        font-size:0.9em;}
.checks label{font-weight:500;margin:0;color:#334;}
#br-summary{margin:4px 0 10px;font-weight:700;font-size:0.9em;color:#1d3557;}
.table-wrap{max-height:460px;overflow:auto;border:1px solid #ccd6ea;border-radius:5px;}
#br-quick-explorer table{width:100%;border-collapse:collapse;margin:0;font-size:0.88em;}
#br-quick-explorer th,#br-quick-explorer td{
  border:1px solid #dde6f2;padding:5px 11px;text-align:left;}
#br-quick-explorer th{background:#eef4fb;color:#1d3557;
  position:sticky;top:0;z-index:1;font-size:0.88em;}
#br-quick-explorer tr:hover td{background:#f5f9ff;}

</style>
</head>
<body>

<div id="header">
  <h1>Bollobás&ndash;Riordan Polynomial Database &mdash; Lens Spaces L(p,&thinsp;q)</h1>
  <a class="gh" href="https://github.com/joseleonm/br-lens-spaces" target="_blank">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="20" height="20" style="vertical-align:middle;margin-right:7px;fill:white;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>GitHub
  </a>
</div>

<div id="main">

<!-- ── Explorer widget ───────────────────────────────────────────────────── -->
<div id="br-quick-explorer">
  <div class="meta">Loading data&hellip;</div>
</div>

  <p class="page-footer">
    For implementation details, mathematical background, and associated resources,
    see the <a href="https://github.com/joseleonm/br-lens-spaces" target="_blank">GitHub repository</a>.
  </p>
</div><!-- #main -->

<script>
(async function () {
  const root = document.getElementById('br-quick-explorer');
  if (!root) return;

  let db = null;
  try {
    const r = await fetch('data/BR_polynomials.json', { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const json = await r.json();
    if (!json || !Array.isArray(json.cases)) throw new Error("Missing 'cases' field");
    db = json;
  } catch (err) {
    root.innerHTML = `<h4>Polynomial Browser</h4>
      <p><strong>Could not load BR_polynomials.json:</strong> ${err.message}</p>`;
    return;
  }

  const cases = db.cases.slice().sort((a, b) => (a.p - b.p) || (a.q - b.q));
  function caseLabel(c) { return `L(${c.p},${c.q})`; }

  function getMaxExponents(c) {
    let maxS = 0, maxT = 0;
    for (const [s, t] of c.terms) { if (s > maxS) maxS = s; if (t > maxT) maxT = t; }
    return [maxS, maxT];
  }

  root.innerHTML = `
    <p class="intro-line">
      Bollobás&ndash;Riordan polynomial of the Heegaard graph
      G(p;&nbsp;&plusmn;1,&nbsp;&plusmn;q) on T&sup2; &mdash;
      <strong>${cases.length} homeomorphism orbits</strong> of L(p,&thinsp;q),
      3&nbsp;&le;&nbsp;p&nbsp;&le;&nbsp;20.
      Select a lens space and open its interactive explorer.
    </p>
    <div class="selector-row">
      <div>
        <label for="br-case">Lens space L(p,&thinsp;q)</label>
        <select id="br-case"></select>
      </div>
      <a id="open-explorer-btn" class="open-btn" href="#" target="_blank">
        Open Interactive Explorer <span class="arrow">&#8599;</span>
      </a>
    </div>
    <p class="explorer-note">
      The interactive explorer for the selected L(p,&thinsp;q) lets you click edges to
      build spanning subgraphs, inspect ribbon-graph invariants k(F), f(F), g(F),
      and visualise the z-slice heat-map in real time.
    </p>
    <div class="controls">
      <div>
        <label for="br-sort">Sort monomials by</label>
        <select id="br-sort">
          <option value="zyx">z, y, x (default)</option>
          <option value="x">x (desc)</option>
          <option value="y">y (desc)</option>
          <option value="z">z (desc)</option>
          <option value="coef">|coeff| (desc)</option>
        </select>
      </div>
      <div>
        <label for="br-ex-min">exp(x) min</label>
        <input id="br-ex-min" type="number" min="0" step="1" />
      </div>
      <div>
        <label for="br-ex-max">exp(x) max</label>
        <input id="br-ex-max" type="number" min="0" step="1" />
      </div>
      <div>
        <label for="br-ey-min">exp(y) min</label>
        <input id="br-ey-min" type="number" min="0" step="1" />
      </div>
      <div>
        <label for="br-ey-max">exp(y) max</label>
        <input id="br-ey-max" type="number" min="0" step="1" />
      </div>
    </div>
    <div class="checks">
      <label><input id="br-z0" type="checkbox" checked /> Include z<sup>0</sup></label>
      <label><input id="br-z2" type="checkbox" checked /> Include z<sup>2</sup></label>
    </div>
    <div id="br-summary"></div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Coeff.</th><th>exp x</th><th>exp y</th><th>exp z</th><th>Monomial</th>
        </tr></thead>
        <tbody id="br-body"></tbody>
      </table>
    </div>
  `;

  const selectCase = root.querySelector('#br-case');
  const sortMode   = root.querySelector('#br-sort');
  const exMin = root.querySelector('#br-ex-min');
  const exMax = root.querySelector('#br-ex-max');
  const eyMin = root.querySelector('#br-ey-min');
  const eyMax = root.querySelector('#br-ey-max');
  const z0       = root.querySelector('#br-z0');
  const z2       = root.querySelector('#br-z2');
  const summary  = root.querySelector('#br-summary');
  const body     = root.querySelector('#br-body');
  const openBtn  = root.querySelector('#open-explorer-btn');

  for (const c of cases) {
    const opt = document.createElement('option');
    opt.value = caseLabel(c);
    opt.textContent = caseLabel(c);
    selectCase.appendChild(opt);
  }

  function typesetMath(target) {
    if (window.MathJax && typeof window.MathJax.typesetPromise === 'function')
      window.MathJax.typesetPromise([target]).catch(() => {});
  }

  function monomialLatex(ex, ey, ez, coef) {
    const hasVars = ex > 0 || ey > 0 || ez > 0;
    if (!hasVars) return String(coef);
    let out = '';
    if (coef === -1) out += '-';
    else if (coef !== 1) out += String(coef);
    if (ex > 0) out += ex === 1 ? 'x' : `x^{${ex}}`;
    if (ey > 0) out += ey === 1 ? 'y' : `y^{${ey}}`;
    if (ez > 0) out += ez === 1 ? 'z' : `z^{${ez}}`;
    return out || '1';
  }

  function updateBounds(c) {
    const [maxS, maxT] = getMaxExponents(c);
    exMin.value = 0; exMax.value = maxS;
    eyMin.value = 0; eyMax.value = maxT;
    exMin.max = maxS; exMax.max = maxS;
    eyMin.max = maxT; eyMax.max = maxT;
  }

  function render() {
    const label = selectCase.value;
    const c = cases.find(x => caseLabel(x) === label) || cases[0];
    const [maxS, maxT] = getMaxExponents(c);
    const xmin = Math.max(0, Number(exMin.value || 0));
    const xmax = Math.max(xmin, Number(exMax.value || maxS));
    const ymin = Math.max(0, Number(eyMin.value || 0));
    const ymax = Math.max(ymin, Number(eyMax.value || maxT));
    const allowedZ = [];
    if (z0.checked) allowedZ.push(0);
    if (z2.checked) allowedZ.push(2);

    let terms = c.terms.filter(([ex, ey, ez]) => {
      if (allowedZ.length > 0 && !allowedZ.includes(ez)) return false;
      return ex >= xmin && ex <= xmax && ey >= ymin && ey <= ymax;
    });

    if (sortMode.value === 'x')
      terms = terms.slice().sort((a,b) => b[0]-a[0] || b[1]-a[1] || b[2]-a[2]);
    else if (sortMode.value === 'y')
      terms = terms.slice().sort((a,b) => b[1]-a[1] || b[0]-a[0] || b[2]-a[2]);
    else if (sortMode.value === 'z')
      terms = terms.slice().sort((a,b) => b[2]-a[2] || b[0]-a[0] || b[1]-a[1]);
    else if (sortMode.value === 'coef')
      terms = terms.slice().sort((a,b) => Math.abs(b[3])-Math.abs(a[3]));
    else
      terms = terms.slice().sort((a,b) => b[2]-a[2] || b[1]-a[1] || b[0]-a[0]);

    summary.textContent =
      `${caseLabel(c)} · total terms: ${c.terms.length} · filtered: ${terms.length}`
      + (c.S2 > 0 ? ` · S₂ = ${c.S2}, m₂ = ${c.m2}` : '');

    openBtn.href = `L${c.p}_${c.q}.html`;
    openBtn.title = `Open interactive explorer for G(${c.p}; ±1, ±${c.q})`;

    const maxRows = 1500;
    const clipped = terms.length > maxRows;
    body.innerHTML = (clipped ? terms.slice(0, maxRows) : terms)
      .map(([ex, ey, ez, coef]) => `
        <tr>
          <td>${coef}</td><td>${ex}</td><td>${ey}</td><td>${ez}</td>
          <td>\\(${monomialLatex(ex, ey, ez, coef)}\\)</td>
        </tr>`).join('');

    if (clipped) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td colspan="5"><em>Showing ${maxRows} of ${terms.length} terms — adjust filters to reduce.</em></td>`;
      body.appendChild(tr);
    }
    typesetMath(body);
  }

  selectCase.addEventListener('change', () => {
    const c = cases.find(x => caseLabel(x) === selectCase.value) || cases[0];
    updateBounds(c); render();
  });
  [sortMode, exMin, exMax, eyMin, eyMax, z0, z2].forEach(el => {
    el.addEventListener('input', render);
    el.addEventListener('change', render);
  });

  selectCase.value = caseLabel(cases[0]);
  updateBounds(cases[0]);
  render();
})();
</script>
</body>
</html>
